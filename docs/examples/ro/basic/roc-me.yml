$:
  version: "1.2"

ro-crate-metadata.json:
  $type: CreativeWork
  conformsTo: https://w3id.org/ro/crate/1.2
  about: ./

./:
  $type: Dataset
  name: "Seagrass survey 2025"
  description: "Transect surveys from Example Bay in 2025."
  datePublished: "2025-08-05"
  license: http://spdx.org/licenses/CC-BY-4.0
  author:
    - "#team-lead"
  hasPart:
    - "data/observations.csv"
    - "data/summary.json"
    - "scripts/analyze.py"
    - "docs/README.md"

#team-lead:
  $type: Person
  name: "Alain Provist"
  email: "alain.provist@example.org"
  affiliation: "https://ror.org/01bj3aw65"

https://ror.org/01bj3aw65:
  $type: Organization
  name: "Marine Research Institute"
  url: "https://example.org/mri"

data/observations.csv:
  $type: File
  name: "Observation log"
  description: "Transect counts by species and plot."
  encodingFormat: text/csv

data/summary.json:
  $type: File
  name: "Summary statistics"
  encodingFormat: application/json

scripts/analyze.py:
  $type:
    - File
    - SoftwareSourceCode
  name: "Analysis script"
  programmingLanguage: Python

docs/README.md:
  $type: File
  name: "Dataset overview"
