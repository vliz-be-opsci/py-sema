ro-crate-metadata.json:
  $type: CreativeWork
  conformsTo: https://w3id.org/ro/crate/1.2
  about: ./

./:
  $type: Dataset
  name: "Example dataset for RO-Crate specification"
  description: Official rainfall readings for Katoomba, NSW 2022, Australia
  datePublished: "2022-12-01"
  license: http://spdx.org/licenses/CC0-1.0
  doi: !resolve '"{DOI}"^^xsd:string'

data.csv:
  $type: File # TODO when this line is removed type becomes rdfs:Resource while it should be the same as for data*.csv
  name: Rainfall data for Katoomba, NSW Australia February 2022
  encodingFormat: text/csv
  license: https://creativecommons.org/licenses/by-nc-sa/3.0/au/

# "*.csv:" # TODO check priority compared to data*.csv
#   ...

data*.csv:
  encodingFormat: application/parquet

datan.csv:
  encodingFormat: application/hdf

spreadsheets:
  $type: Dataset
  # $include: ...
  # $exclude: "./spreadsheets/subfolder"

https://ror.org/04dkp1p98:
  $type: Organization
  # $inverse:
  #   publisher: "./"
  #   associated_publisher: ["./", "./data.csv"]
  name: Bureau of Meteorology
  description: Australian Government Bureau of Meteorology
  url: '"http://www.bom.gov.au/"^^xsd:string'

https://creativecommons.org/licenses/by-nc-sa/3.0/au/:
